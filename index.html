/* =========================================================
   5) 폴백 일러스트 컴포넌트
      ILLUS에 자체 SVG가 있으면 그걸,
      없으면 EMOJI_MAP의 이모지를,
      그것마저 없으면 단어 첫 글자를 표시.
   ========================================================= */
const EmojiFrame = ({emoji, bg='#FFF7ED'}) => (
  <div className="w-full h-full rounded-2xl flex items-center justify-center"
       style={{background: bg, fontSize: '72px', lineHeight:1}}>
    <span style={{filter:'drop-shadow(0 2px 4px rgba(0,0,0,.06))'}}>{emoji}</span>
  </div>
);
const InitialFrame = ({letter}) => (
  <div className="w-full h-full rounded-2xl flex items-center justify-center bg-stone-100">
    <span className="text-6xl font-extrabold text-stone-400 word-en">{letter.toUpperCase()}</span>
  </div>
);
const Illustration = ({word}) => {
  if (ILLUS[word]) return ILLUS[word];
  if (EMOJI_MAP[word]) return <EmojiFrame emoji={EMOJI_MAP[word]}/>;
  return <InitialFrame letter={word[0]}/>;
};

   6) 입 모양 SVG (5개 단모음)
   ========================================================= */
const MouthSVG = ({stage}) => {
  const shapes = {
    a: <>
      <ellipse cx="60" cy="60" rx="34" ry="8" fill="#FCA5A5"/>
      <ellipse cx="60" cy="62" rx="20" ry="14" fill="#7F1D1D"/>
      <ellipse cx="60" cy="78" rx="14" ry="3" fill="#FB7185" opacity=".8"/>
    </>,
    e: <>
      <ellipse cx="60" cy="60" rx="38" ry="10" fill="#FCA5A5"/>
      <ellipse cx="60" cy="60" rx="30" ry="4" fill="#7F1D1D"/>
      <rect x="40" y="58" width="40" height="4" fill="#FFFFFF" opacity=".5"/>
    </>,
    i: <>
      <ellipse cx="60" cy="60" rx="42" ry="6" fill="#FCA5A5"/>
      <ellipse cx="60" cy="60" rx="34" ry="2" fill="#7F1D1D"/>
      <rect x="36" y="58" width="48" height="4" fill="#FFFFFF" opacity=".6"/>
    </>,
    o: <>
      <circle cx="60" cy="60" r="14" fill="#FCA5A5"/>
      <circle cx="60" cy="60" r="8" fill="#7F1D1D"/>
    </>,
    u: <>
      <ellipse cx="60" cy="60" rx="14" ry="9" fill="#FCA5A5"/>
      <ellipse cx="60" cy="60" rx="8" ry="5" fill="#7F1D1D"/>

  };
  return (

/* =========================================================
   7) Web Speech API — Chrome 버그 대응판
      - cancel() 직후 즉시 speak()를 호출하면 무시되는 버그(120ms 지연으로 회피)
      - 페이지 로드 15초 후 자동 sleep되는 버그 (resume()으로 깨움)
      - voices 비어있을 때 onvoiceschanged 대기 후 재시도
      - 영어 음성이 시스템에 없을 때 안내 (한국 윈도우 일부)
   ========================================================= */
let _voicesReady = false;
let _speakWatchdog = null;

const ensureSpeechAlive = () => {
  if (!('speechSynthesis' in window)) return;
  if (window.speechSynthesis.paused) window.speechSynthesis.resume();
};

const pickEnglishVoice = () => {
  const voices = window.speechSynthesis.getVoices();
  if (!voices || voices.length === 0) return null;
  return voices.find(v => /en[-_]?(US|GB)/i.test(v.lang) && /female|samantha|google|microsoft/i.test(v.name))
      || voices.find(v => /en[-_]?(US|GB)/i.test(v.lang))
      || voices.find(v => /^en/i.test(v.lang));
};

const _doSpeak = (text, opts) => {
  ensureSpeechAlive();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = opts.lang || 'en-US';
  u.rate = opts.rate ?? 1;
  u.pitch = opts.pitch ?? 1;
  const enVoice = pickEnglishVoice();
  if (enVoice) u.voice = enVoice;
  u.onstart = opts.onstart || null;
  u.onend = opts.onend || null;
  u.onerror = (e) => { console.warn('Speech error:', e); opts.onerror && opts.onerror(e); };
  try {
    window.speechSynthesis.speak(u);
    // 워치독: Chrome이 speak를 1초 안에 시작하지 않으면 한 번 더 트리거
    clearTimeout(_speakWatchdog);
    _speakWatchdog = setTimeout(() => {
      if (!window.speechSynthesis.speaking && !window.speechSynthesis.pending) {
        try { window.speechSynthesis.speak(new SpeechSynthesisUtterance(text)); } catch {}
      }
    }, 800);
  } catch (e) {
    console.error('Speech failed:', e);
  }
};

const speak = (text, opts={}) => {
  if (!('speechSynthesis' in window)) {
    console.warn('이 브라우저는 음성 합성을 지원하지 않습니다.');
    return;
  }
  // voices가 아직 안 왔으면 한 번 더 기다렸다가 재시도
  if (!_voicesReady && window.speechSynthesis.getVoices().length === 0) {
    setTimeout(() => speak(text, opts), 250);
    return;
  }
  _voicesReady = true;

  // 이미 재생 중이면 cancel 후 충분히 지연하고 다시 호출 (Chrome 버그 회피)
  if (window.speechSynthesis.speaking || window.speechSynthesis.pending) {
    window.speechSynthesis.cancel();
    setTimeout(() => _doSpeak(text, opts), 120);
    return;
  }
  _doSpeak(text, opts);
};

// Chrome 자동 sleep 방지 — 14초마다 한번 깨워주기
if (typeof window !== 'undefined' && 'speechSynthesis' in window) {
  setInterval(() => {
    if (window.speechSynthesis.speaking) {
      window.speechSynthesis.pause();
      window.speechSynthesis.resume();
    }
  }, 14000);
}

/* =========================================================
   8) localStorage 진도 훅
   ========================================================= */
const usePersist = (key, init) => {
  const [val, setVal] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : init; }
    catch { return init; }
  });
  useEffect(() => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }, [key, val]);
  return [val, setVal];
};

const LessonView = ({stageKey, onDone, onHome, setProgress, reports, setReports}) => {
  const stage = STAGES.find(s => s.key === stageKey);
  const words = WORDS[stageKey];
  const [idx, setIdx] = useState(0);
  const [phase, setPhase] = useState('intro');
  const [highlight, setHighlight] = useState(-1);
  const [reportToast, setReportToast] = useState(null);

  const w = words[idx];

  const [isSpeaking, setIsSpeaking] = useState(false);

  const playSlow = async () => {
    if (isSpeaking) return;
    setIsSpeaking(true);
    setHighlight(-1);
    if (window.speechSynthesis.speaking || window.speechSynthesis.pending) {
      window.speechSynthesis.cancel();
      await new Promise(r => setTimeout(r, 150));
    }
    for (let i=0;i<w.sounds.length;i++) {
      setHighlight(i);
      await new Promise(r => setTimeout(r, 80));
      await new Promise(resolve => {
        ensureSpeechAlive();
        const u = new SpeechSynthesisUtterance(w.sounds[i][0]);
        u.lang='en-US'; u.rate=0.55;
        const v = pickEnglishVoice(); if (v) u.voice = v;
        u.onend = () => setTimeout(resolve, 220);
        u.onerror = () => resolve();
        try { window.speechSynthesis.speak(u); }
        catch { resolve(); }
      });
    }
    setHighlight(-1);
    setIsSpeaking(false);
  };
  const playFast = () => {
    setIsSpeaking(true);
    speak(w.word, {rate: 0.95, onend: () => setIsSpeaking(false), onerror: () => setIsSpeaking(false)});
  };

  const markComplete = () => {
    setProgress(p => ({...p, words: {...(p.words||{}), [w.word]: {completed:true, ts: Date.now()}}}));
  };
  const next = () => {
    markComplete();
    if (idx < words.length - 1) { setIdx(idx+1); setPhase('learn'); }
    else { onDone(); }
  };

  if (phase === 'intro') {
    return (
      <div>
        <TopBar onHome={onHome} title={stage.label} right={`${idx+1}/${words.length}`}/>
        <div className="max-w-xl mx-auto px-5 py-8 pop-in">
          <div className="bg-white rounded-3xl border border-stone-200 p-6 text-center">
            <div className="text-stone-500 text-sm mb-1">입 모양 가이드</div>
            <div className="text-2xl font-bold text-stone-800 mb-4">/{stage.sound}/ 소리</div>
            <div className="w-40 h-40 mx-auto mb-4"><MouthSVG stage={stage.key}/></div>
            <p className="text-stone-600">{stage.mouth}</p>
          </div>
          <button onClick={() => setPhase('learn')}
                  className="w-full mt-5 py-4 rounded-2xl text-white font-bold text-lg shadow-md transition"
                  style={{background: stage.color}}>
            단어 학습 시작 →
          </button>
        </div>
      </div>
    );
  }

  return (
    <div>
      <TopBar onHome={onHome} title={stage.label} right={`${idx+1}/${words.length}`}/>
      <div className="max-w-xl mx-auto px-5 py-6 pop-in">
        <div className="bg-white rounded-3xl border border-stone-200 p-6 relative">
          {(() => {
            const already = reports?.[w.word];
            const reportImg = () => {
              setReports(p => ({...(p||{}), [w.word]: {ts: Date.now(), stage: stageKey}}));
              setReportToast(`"${w.word}" 그림 오류를 신고했어요! 다음에 개선할게요 🙏`);
              setTimeout(() => setReportToast(null), 2500);
            };
            return (
              <button onClick={reportImg} disabled={!!already}
                className={`absolute top-3 right-3 text-xs px-2.5 py-1.5 rounded-full transition flex items-center gap-1
                  ${already ? 'bg-stone-100 text-stone-400' : 'bg-amber-50 hover:bg-amber-100 text-amber-700 border border-amber-200'}`}
                title={already ? '이미 신고함' : '그림이 단어와 안 맞으면 알려주세요'}>
                {already ? '✓ 신고됨' : '⚠️ 그림 오류 신고'}
              </button>
            );
          })()}
          <div className="aspect-square w-48 mx-auto mb-4"><Illustration word={w.word}/></div>
          <div className="text-center mb-2">
            <div className="text-5xl font-extrabold word-en text-stone-800">{w.word}</div>
            <div className="text-stone-500 mt-1">뜻: <b className="text-stone-700">{w.meaning}</b></div>
          </div>
          <div className="mt-5">
            <div className="text-xs text-stone-500 mb-2 text-center">소리 분해</div>
            <div className="flex items-center justify-center gap-2 flex-wrap">
              {w.sounds.map((s, i) => (
                <React.Fragment key={i}>
                  <div className={`transition-all rounded-2xl px-3 py-2 ${highlight===i?'scale-110':''}`}
                       style={{background: highlight===i ? stage.color : '#F5F5F4', color: highlight===i ? 'white' : '#44403C'}}>
                    <div className="text-2xl font-extrabold word-en text-center">{s[0]}</div>
                    <div className="text-xs text-center">/{s[1]}/</div>
                  </div>
                  {i < w.sounds.length-1 && <span className="text-stone-400 text-xl">+</span>}
                </React.Fragment>
              ))}
            </div>
            <div className="text-center mt-4 text-stone-500 text-sm">
              <span className="px-2 py-1 rounded-lg bg-stone-100">/{w.read}/</span>
              <span className="mx-2">→ 빠르게 읽어서</span>
              <span className="px-2 py-1 rounded-lg font-bold" style={{background: stage.color+'22', color: stage.color}}>/{w.fast}/</span>
            </div>
          </div>
          <div className="mt-6 grid grid-cols-2 gap-3">
            <button onClick={playSlow} disabled={isSpeaking}
                    className={`py-3 rounded-2xl font-semibold transition ${isSpeaking ? 'bg-stone-200 text-stone-400' : 'bg-stone-100 hover:bg-stone-200 text-stone-700'}`}>
              🐢 느리게 듣기
            </button>
            <button onClick={playFast} disabled={isSpeaking}
                    className={`py-3 rounded-2xl text-white font-semibold transition ${isSpeaking ? 'opacity-70' : 'pulse-ring'}`}
                    style={{background: stage.color}}>
              {isSpeaking ? '🔊 재생 중...' : '🔊 빠르게 듣기'}
            </button>
          </div>
        </div>
        <button onClick={next}
                className="w-full mt-4 py-4 rounded-2xl bg-stone-800 hover:bg-stone-900 text-white text-lg font-bold transition">
          {idx === words.length-1 ? '퀴즈 풀러 가기 →' : '다음 단어 →'}
        </button>
        {reportToast && (
          <div className="fixed bottom-6 left-1/2 -translate-x-1/2 bg-stone-800 text-white px-5 py-3 rounded-2xl shadow-xl text-sm z-50 pop-in">
            {reportToast}
          </div>
        )}
      </div>
    </div>
  );
};

/* =========================================================
   13) 퀴즈 (단계당 10문제, 4지선다)
   ========================================================= */
const QuizView = ({stageKey, onDone, onHome}) => {
  const stage = STAGES.find(s => s.key === stageKey);
  const words = WORDS[stageKey];
  const [qIdx, setQIdx] = useState(0);
  const [score, setScore] = useState(0);
  const [feedback, setFeedback] = useState(null);

  const question = useMemo(() => {
    const correct = words[qIdx];
    const otherKeys = STAGES.filter(s => s.key !== stageKey).map(s => s.key);
    const otherWords = otherKeys.flatMap(k => WORDS[k]);
    const pool = [...words.filter(w => w.word !== correct.word), ...otherWords];
    const distractors = pool.sort(() => Math.random()-0.5).slice(0, 3);
    const options = [correct, ...distractors].sort(() => Math.random()-0.5);
    return { correct, options };
  }, [qIdx, stageKey]);

  const answer = (opt) => {
    if (feedback) return;
    const ok = opt.word === question.correct.word;
    setFeedback({ok, picked: opt.word});
    if (ok) setScore(s => s+1);
    setTimeout(() => {
      setFeedback(null);
      if (qIdx < words.length-1) setQIdx(qIdx+1);
      else onDone(score + (ok?1:0));
    }, 1100);
  };

  // 새 문제로 넘어갈 때 음성을 들려준다. voices/페이지 인터랙션 타이밍 대응 위해 짧게 지연
  useEffect(() => {
    const t = setTimeout(() => speak(question.correct.word, {rate: .9}), 250);
    return () => clearTimeout(t);
  }, [qIdx]);

  return (
    <div>
      <TopBar onHome={onHome} title="듣고 그림 고르기" right={`${qIdx+1}/${words.length}`}/>
      <div className="max-w-xl mx-auto px-5 py-6 pop-in">
        <div className="bg-white rounded-3xl border border-stone-200 p-6 text-center">
          <div className="text-stone-500 text-sm">들려주는 단어의 그림을 골라보세요</div>
          <div className="mt-3 mb-5">
            <button onClick={() => speak(question.correct.word, {rate: .9})}
                    className="px-5 py-3 rounded-2xl text-white font-semibold shadow-md"
                    style={{background: stage.color}}>
              🔊 다시 듣기
            </button>
          </div>
          <div className="grid grid-cols-2 gap-3">
            {question.options.map(opt => {
              const isCorrect = feedback && opt.word === question.correct.word;
              const isPicked  = feedback && opt.word === feedback.picked;
              const wrong = isPicked && !feedback.ok;
              return (
                <button key={opt.word} onClick={() => answer(opt)}
                        className={`aspect-square rounded-2xl overflow-hidden border-4 transition
                          ${isCorrect ? 'border-green-400 ring-4 ring-green-200' : wrong ? 'border-red-400 ring-4 ring-red-200' : 'border-stone-200 hover:border-stone-300'}`}>
                  <Illustration word={opt.word}/>
                </button>
              );
            })}
          </div>
          {feedback && (
            <div className={`mt-5 text-lg font-bold ${feedback.ok?'text-green-600':'text-red-500'}`}>
              {feedback.ok ? '잘 들었어요! 🎉' : `정답은 "${question.correct.word}" 였어요.`}
            </div>
          )}
        </div>
        <div className="mt-4 text-center text-stone-500 text-sm">현재 점수: <b className="text-stone-700">{score}</b> / {words.length}</div>
      </div>
    </div>
  );
};

/* =========================================================
   14.6) 학습 통계 대시보드
   ========================================================= */
const StatsView = ({progress, onHome}) => {
  const words = progress?.words || {};
  const completedWords = Object.entries(words).filter(([w,v]) => v.completed);
  const total = Object.values(WORDS).reduce((a,b)=>a+b.length,0);
  const done = completedWords.length;
  const pct = total ? Math.round(done/total*100) : 0;
  const stageStats = STAGES.map(s => {
    const sw = WORDS[s.key] || [];
    const sd = sw.filter(w => words[w.word]?.completed).length;
    return { ...s, total: sw.length, done: sd, pct: sw.length ? Math.round(sd/sw.length*100) : 0 };
  });
  const byDay = {};
  const now = new Date();
  for (let i = 6; i >= 0; i--) {
    const d = new Date(now); d.setDate(now.getDate()-i);
    byDay[d.toISOString().slice(0,10)] = 0;
  }
  for (const [w, info] of Object.entries(words)) {
    if (info.ts) {
      const k = new Date(info.ts).toISOString().slice(0,10);
      if (k in byDay) byDay[k]++;
    }
  }
  const dayKeys = Object.keys(byDay);
  const maxCount = Math.max(1, ...Object.values(byDay));
  const byLevel = {};
  for (const s of stageStats) {
    if (!byLevel[s.level]) byLevel[s.level] = { total:0, done:0 };
    byLevel[s.level].total += s.total;
    byLevel[s.level].done += s.done;
  }
  const levelLabel = {1:'단모음',2:'매직 e',3:'이중자음',4:'이중모음',5:'사이트워드',6:'독해'};
  return (
    <div>
      <TopBar onHome={onHome} title="학습 통계" right={`${done}/${total}`}/>
      <div className="max-w-2xl mx-auto px-5 py-6 pop-in space-y-4">
        <div className="bg-white rounded-3xl border border-stone-200 p-6">
          <div className="flex items-center justify-between mb-3">
            <div>
              <div className="text-stone-500 text-sm">전체 진도</div>
              <div className="text-3xl font-extrabold text-stone-800">{pct}<span className="text-base font-bold text-stone-500">%</span></div>
            </div>
            <div className="text-5xl">{pct===100 ? '🏆' : pct>=70 ? '🌳' : pct>=30 ? '🌿' : '🌱'}</div>
          </div>
          <div className="w-full h-4 bg-stone-100 rounded-full overflow-hidden">
            <div className="h-full bg-orange-400 transition-all" style={{width:`${pct}%`}}/>
          </div>
          <div className="text-xs text-stone-500 mt-2">{done} / {total} 단어 학습 완료</div>
        </div>
        <div className="bg-white rounded-3xl border border-stone-200 p-6">
          <div className="text-stone-500 text-sm mb-3">최근 7일 학습량</div>
          <div className="flex items-end justify-between gap-1 h-32">
            {dayKeys.map(k => {
              const c = byDay[k];
              const h = c === 0 ? 4 : Math.max(8, (c/maxCount)*100);
              const d = new Date(k);
              return (
                <div key={k} className="flex-1 flex flex-col items-center gap-1">
                  <div className="text-xs font-bold text-stone-700">{c||''}</div>
                  <div className="w-full bg-orange-400 rounded-t-md" style={{height: h+'px', minHeight:'4px', opacity: c===0?0.2:1}}/>
                  <div className="text-xs text-stone-500">{d.getDate()}</div>
                </div>
              );
            })}
          </div>
        </div>
        <div className="bg-white rounded-3xl border border-stone-200 p-6">
          <div className="text-stone-500 text-sm mb-3">Level별 진도</div>
          <div className="space-y-2">
            {Object.entries(byLevel).map(([lv, info]) => {
              const p = info.total ? Math.round(info.done/info.total*100) : 0;
              return (
                <div key={lv}>
                  <div className="flex justify-between text-sm mb-1">
                    <span className="text-stone-700 font-semibold">Lv.{lv} {levelLabel[lv]||''}</span>
                    <span className="text-stone-500">{info.done}/{info.total} ({p}%)</span>
                  </div>
                  <div className="w-full h-2 bg-stone-100 rounded-full overflow-hidden">
                    <div className="h-full bg-stone-700" style={{width:`${p}%`}}/>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
};

const ReadingDetailView = ({readingId, onBack, onHome, progress, setProgress}) => {
  const reading = READINGS.find(r => r.id === readingId);
  const [showKo, setShowKo] = useState(true);
  const [playingIdx, setPlayingIdx] = useState(-1);
  const [autoPlaying, setAutoPlaying] = useState(false);
  const isReadDone = !!progress?.readings?.[readingId]?.read;

  const playOne = (idx) => {
    if (playingIdx === idx) {
      window.speechSynthesis.cancel();
      setPlayingIdx(-1);
      return;
    }
    setPlayingIdx(idx);
    speak(reading.sentences[idx].en, {
      rate: 0.85,
      onend: () => setPlayingIdx(-1),
      onerror: () => setPlayingIdx(-1),
    });
  };

  const playAll = () => {
    if (autoPlaying) {
      window.speechSynthesis.cancel();
      setAutoPlaying(false);
      setPlayingIdx(-1);
      return;
    }
    setAutoPlaying(true);
    let i = 0;
    const next = () => {
      if (i >= reading.sentences.length) {
        setAutoPlaying(false);
        setPlayingIdx(-1);
        return;
      }
      setPlayingIdx(i);
      speak(reading.sentences[i].en, {
        rate: 0.85,
        onend: () => { i++; setTimeout(next, 350); },
        onerror: () => { i++; setTimeout(next, 350); },
      });
    };
    next();
  };

  const markRead = () => {
    setProgress(p => ({
      ...p,
      readings: { ...(p.readings||{}), [readingId]: { read: true, ts: Date.now() } }
    }));
  };

  return (
    <div>
      <TopBar onHome={onHome} title={reading.title} right={reading.subtitle}/>
      <div className="max-w-2xl mx-auto px-5 py-6 pop-in">
        <button onClick={onBack}
                className="text-sm text-stone-500 hover:text-stone-800 mb-4 flex items-center gap-1">
          ← 독해 목록으로
        </button>

        <div className="bg-white rounded-3xl border border-stone-200 p-6 mb-4">
          <div className="flex items-center justify-between mb-4">
            <div className="flex items-center gap-3">
              <div className="w-16 h-16 rounded-2xl flex items-center justify-center text-4xl"
                   style={{background: reading.color+'22'}}>{reading.emoji}</div>
              <div>
                <div className="text-2xl font-extrabold text-stone-800 word-en">{reading.title}</div>
                <div className="text-stone-500 text-sm">{reading.subtitle}</div>
              </div>
            </div>
            <button onClick={() => setShowKo(v => !v)}
                    className="text-xs px-3 py-1.5 rounded-full bg-stone-100 hover:bg-stone-200 text-stone-700">
              {showKo ? '한글 숨기기' : '한글 보기'}
            </button>
          </div>

          <button onClick={playAll}
                  className="w-full py-3 rounded-2xl text-white font-bold text-base mb-5 transition shadow-sm"
                  style={{background: autoPlaying ? '#94A3B8' : reading.color}}>
            {autoPlaying ? '⏸ 멈추기' : '▶ 전체 듣기 (전부 읽어줘요)'}
          </button>

          <div className="space-y-3">
            {reading.sentences.map((s, i) => (
              <div key={i}
                   className={`rounded-2xl border p-4 transition ${
                     playingIdx === i ? 'border-orange-400 bg-orange-50 pulse-ring' : 'border-stone-200 bg-stone-50/50'
                   }`}>
                <div className="flex items-start gap-3">
                  <div className="text-xs font-bold text-stone-400 w-5 pt-1">{i+1}</div>
                  <div className="flex-1">
                    <div className="text-lg font-semibold text-stone-800 word-en leading-relaxed">{s.en}</div>
                    {showKo && <div className="text-sm text-stone-500 mt-1">{s.ko}</div>}
                  </div>
                  <button onClick={() => playOne(i)}
                          className="flex-shrink-0 w-10 h-10 rounded-full flex items-center justify-center text-white transition"
                          style={{background: playingIdx === i ? '#94A3B8' : reading.color}}>
                    {playingIdx === i ? '⏸' : '🔊'}
                  </button>
                </div>
              </div>
            ))}
          </div>
        </div>

        <button onClick={markRead}
                disabled={isReadDone}
                className={`w-full py-4 rounded-2xl text-lg font-bold transition shadow-sm ${
                  isReadDone
                    ? 'bg-stone-100 text-stone-400'
                    : 'bg-green-500 hover:bg-green-600 text-white'
                }`}>
          {isReadDone ? '✅ 다 읽었어요' : '✅ 다 읽었어요 (체크하기)'}
        </button>
      </div>
    </div>
  );

const PrintTestView = ({onHome}) => {
  const [selected, setSelected] = useState(new Set());
  const [testType, setTestType] = useState('en2ko'); // 'en2ko' or 'ko2en'
  const [includeTest, setIncludeTest] = useState(true);
  const [includeAnswer, setIncludeAnswer] = useState(true);
  const [shuffle, setShuffle] = useState(false);
  const [columns, setColumns] = useState(2);

  const toggleUnit = (id) => {
    setSelected(prev => {
      const n = new Set(prev);
      if (n.has(id)) n.delete(id);
      else n.add(id);
      return n;
    });
  };
  const selectAll = () => setSelected(new Set(EGU_UNITS.map(u => u.id)));
  const selectNone = () => setSelected(new Set());
  const selectRange = (start, end) => {
    setSelected(prev => {
      const n = new Set(prev);
      for (let i = start; i <= end; i++) {
        const u = EGU_UNITS.find(x => x.num === i);
        if (u) n.add(u.id);
      }
      return n;
    });
  };

  const selectedUnits = EGU_UNITS.filter(u => selected.has(u.id));
  const totalWords = selectedUnits.reduce((a,u) => a + u.words.length, 0);

  const buildPrintHTML = () => {
    // Gather words in order, optionally shuffle
    let words = [];
    for (const u of selectedUnits) {
      for (const w of u.words) words.push({...w, unit: u.num});
    }
    if (shuffle) {
      // Fisher-Yates
      for (let i = words.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i+1));
        [words[i], words[j]] = [words[j], words[i]];
      }
    }
    const unitsLabel = selectedUnits.map(u => `U${String(u.num).padStart(2,'0')}`).join(', ');
    const typeLabel = testType === 'en2ko' ? '영어 → 한글 뜻 쓰기' : '한글 뜻 → 영어 스펠링 쓰기';
    const today = new Date().toLocaleDateString('ko-KR');

    const rows = (showAnswer) => {
      const colItems = Array.from({length: columns}, () => []);
      words.forEach((w, i) => {
        const col = Math.floor(i / Math.ceil(words.length / columns));
        const safeCol = Math.min(col, columns - 1);
        const question = testType === 'en2ko' ? w.en : w.ko;
        const answer = testType === 'en2ko' ? w.ko : w.en;
        colItems[safeCol].push({num: i+1, q: question, a: answer});
      });
      return colItems.map(items => `
        <div class="col">
          ${items.map(it => `
            <div class="q-row">
              <span class="q-num">${it.num}.</span>
              <span class="q-text">${it.q.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</span>
              ${showAnswer
                ? `<span class="ans-text">${it.a.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</span>`
                : `<span class="blank">_________________</span>`}
            </div>
          `).join('')}
        </div>
      `).join('');
    };

    const sheet = (title, showAnswer) => `
      <section class="sheet">
        <header class="head">
          <div>
            <div class="brand">베스트교육 호매실캠퍼스 · ☎ 031-292-2828</div>
            <h1>${title}</h1>
            <div class="meta">단원: ${unitsLabel} · 유형: ${typeLabel} · 총 ${words.length}문제</div>
          </div>
          <div class="info">
            <div>이름: <span class="ul"></span></div>
            <div>점수: <span class="ul-sm"></span> / ${words.length}</div>
            <div class="date">${today}</div>
          </div>
        </header>
        <div class="grid cols-${columns}">
          ${rows(showAnswer)}
        </div>
      </section>
    `;

    return `<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>EGU 단어 시험지 — ${unitsLabel}</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: 'Malgun Gothic','맑은 고딕','Apple SD Gothic Neo',sans-serif; color: #1f2937; margin: 0; padding: 0; }
  .sheet { padding: 14mm 12mm; page-break-after: always; }
  .sheet:last-child { page-break-after: auto; }
  .head { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 2px solid #1f2937; padding-bottom: 8px; margin-bottom: 14px; }
  .brand { font-size: 10pt; color: #6b7280; margin-bottom: 4px; }
  .head h1 { font-size: 18pt; font-weight: 800; margin: 0 0 4px 0; }
  .meta { font-size: 9.5pt; color: #6b7280; }
  .info { font-size: 10pt; text-align: right; line-height: 1.7; }
  .info .ul { display:inline-block; border-bottom:1px solid #1f2937; min-width:80px; }
  .info .ul-sm { display:inline-block; border-bottom:1px solid #1f2937; min-width:35px; text-align:center; }
  .info .date { color:#9ca3af; font-size: 9pt; margin-top: 4px; }
  .grid { display: grid; gap: 0 12mm; }
  .grid.cols-1 { grid-template-columns: 1fr; }
  .grid.cols-2 { grid-template-columns: 1fr 1fr; }
  .grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
  .col { display: flex; flex-direction: column; }
  .q-row { display: flex; align-items: baseline; padding: 5.5px 0; border-bottom: 1px dotted #d1d5db; font-size: 10.5pt; }
  .q-num { color: #6b7280; min-width: 28px; }
  .q-text { font-weight: 600; flex: 0 0 auto; margin-right: 8px; }
  .blank { flex: 1; color: transparent; }
  .ans-text { flex: 1; color: #dc2626; font-weight: 700; }
  .answer-sheet .head h1::before { content: '✅ '; color: #16a34a; }
  @page { size: A4 portrait; margin: 0; }
  @media print {
    body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .no-print { display: none !important; }
  }
  .toolbar { background:#f3f4f6; padding:10px 16px; border-bottom:1px solid #d1d5db; display:flex; gap:8px; align-items:center; font-size: 10pt; }
  .toolbar button { padding: 6px 14px; border: 1px solid #6b7280; background: white; border-radius: 6px; cursor: pointer; font-size: 10pt; }
  .toolbar button.primary { background: #2563eb; color: white; border-color: #2563eb; font-weight: 600; }
</style>
</head>
<body>
<div class="toolbar no-print">
  <button class="primary" onclick="window.print()">🖨 인쇄하기</button>
  <button onclick="window.close()">닫기</button>
  <span style="margin-left:auto; color:#6b7280;">시험지 ${includeTest?'O':'X'} · 정답지 ${includeAnswer?'O':'X'} · ${words.length}문제</span>
</div>
${includeTest ? sheet('EGU 단어 시험지', false) : ''}
${includeAnswer ? `<div class="answer-sheet">${sheet('EGU 단어 시험지 — 정답지', true)}</div>` : ''}
</body>
</html>`;
  };

  const handlePrint = () => {
    if (selected.size === 0) {
      alert('하나 이상의 단원을 선택해주세요.');
      return;
    }
    if (!includeTest && !includeAnswer) {
      alert('시험지나 정답지 중 하나는 켜져 있어야 해요.');
      return;
    }
    const win = window.open('', '_blank', 'width=900,height=900');
    if (!win) {
      alert('팝업이 차단되었어요. 팝업 차단을 해제한 뒤 다시 시도해주세요.');
      return;
    }
    win.document.write(buildPrintHTML());
    win.document.close();
  };

  return (
    <div>
      <TopBar onHome={onHome} title="📝 단어 시험지 만들기" right={selected.size > 0 ? `${selected.size}단원, ${totalWords}문제` : '단원 선택'}/>
      <div className="max-w-4xl mx-auto px-5 py-6 pop-in space-y-4">

        {/* 1. 단원 선택 */}
        <div className="bg-white rounded-3xl border border-stone-200 p-5">
          <div className="flex items-center justify-between mb-3">
            <h2 className="font-bold text-stone-800">① 단원 선택 (다중 가능)</h2>
            <div className="flex gap-2 text-xs">
              <button onClick={selectAll} className="px-3 py-1 rounded-full bg-stone-100 hover:bg-stone-200 text-stone-700">전체</button>
              <button onClick={selectNone} className="px-3 py-1 rounded-full bg-stone-100 hover:bg-stone-200 text-stone-700">해제</button>
            </div>
          </div>
          <div className="flex flex-wrap gap-1.5 mb-3 text-xs">
            <span className="text-stone-500 mr-2 py-1">빠른 선택:</span>
            <button onClick={() => selectRange(1,10)} className="px-2 py-1 rounded bg-blue-50 hover:bg-blue-100 text-blue-700">1~10</button>
            <button onClick={() => selectRange(11,20)} className="px-2 py-1 rounded bg-blue-50 hover:bg-blue-100 text-blue-700">11~20</button>
            <button onClick={() => selectRange(21,30)} className="px-2 py-1 rounded bg-blue-50 hover:bg-blue-100 text-blue-700">21~30</button>
            <button onClick={() => selectRange(31,40)} className="px-2 py-1 rounded bg-blue-50 hover:bg-blue-100 text-blue-700">31~40</button>
            <button onClick={() => selectRange(41,50)} className="px-2 py-1 rounded bg-blue-50 hover:bg-blue-100 text-blue-700">41~50</button>
            <button onClick={() => selectRange(51,55)} className="px-2 py-1 rounded bg-blue-50 hover:bg-blue-100 text-blue-700">51~55</button>
          </div>
          <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-2">
            {EGU_UNITS.map(u => {
              const sel = selected.has(u.id);
              const color = unitColor(u.num);
              return (
                <button key={u.id} onClick={() => toggleUnit(u.id)}
                        className={`text-left p-2.5 rounded-xl border-2 transition no-select ${
                          sel ? 'border-stone-800 bg-stone-50' : 'border-stone-200 bg-white hover:border-stone-400'
                        }`}>
                  <div className="flex items-center gap-2">
                    <div className={`w-5 h-5 rounded flex items-center justify-center text-xs font-bold flex-shrink-0 ${
                      sel ? 'bg-stone-800 text-white' : 'border-2 border-stone-300'
                    }`}>{sel ? '✓' : ''}</div>
                    <div className="flex-1 min-w-0">
                      <div className="text-xs font-bold" style={{color}}>U{String(u.num).padStart(2,'0')}</div>
                      <div className="text-xs text-stone-700 truncate">{u.desc}</div>
                    </div>
                  </div>
                </button>
              );
            })}
          </div>
        </div>

        {/* 2. 시험 유형 */}
        <div className="bg-white rounded-3xl border border-stone-200 p-5">
          <h2 className="font-bold text-stone-800 mb-3">② 시험 유형</h2>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <button onClick={() => setTestType('en2ko')}
                    className={`p-4 rounded-2xl border-2 text-left transition ${
                      testType === 'en2ko' ? 'border-blue-500 bg-blue-50' : 'border-stone-200 hover:border-stone-400'
                    }`}>
              <div className="font-bold text-stone-800 mb-1">🇺🇸 영어 → 🇰🇷 한글</div>
              <div className="text-xs text-stone-500">apple → ____ (사과)</div>
            </button>
            <button onClick={() => setTestType('ko2en')}
                    className={`p-4 rounded-2xl border-2 text-left transition ${
                      testType === 'ko2en' ? 'border-blue-500 bg-blue-50' : 'border-stone-200 hover:border-stone-400'
                    }`}>
              <div className="font-bold text-stone-800 mb-1">🇰🇷 한글 → 🇺🇸 영어</div>
              <div className="text-xs text-stone-500">사과 → ____ (apple)</div>
            </button>
          </div>
        </div>

        {/* 3. 출력 옵션 */}
        <div className="bg-white rounded-3xl border border-stone-200 p-5">
          <h2 className="font-bold text-stone-800 mb-3">③ 출력 옵션</h2>
          <div className="space-y-2">
            <label className="flex items-center gap-3 p-3 rounded-xl bg-stone-50 cursor-pointer hover:bg-stone-100">
              <input type="checkbox" checked={includeTest} onChange={(e)=>setIncludeTest(e.target.checked)}
                     className="w-5 h-5"/>
              <div>
                <div className="font-semibold text-stone-800">시험지 출력</div>
                <div className="text-xs text-stone-500">학생용 빈 답란 시험지</div>
              </div>
            </label>
            <label className="flex items-center gap-3 p-3 rounded-xl bg-stone-50 cursor-pointer hover:bg-stone-100">
              <input type="checkbox" checked={includeAnswer} onChange={(e)=>setIncludeAnswer(e.target.checked)}
                     className="w-5 h-5"/>
              <div>
                <div className="font-semibold text-stone-800">정답지 출력</div>
                <div className="text-xs text-stone-500">선생님용 정답이 적힌 채점지</div>
              </div>
            </label>
            <label className="flex items-center gap-3 p-3 rounded-xl bg-stone-50 cursor-pointer hover:bg-stone-100">
              <input type="checkbox" checked={shuffle} onChange={(e)=>setShuffle(e.target.checked)}
                     className="w-5 h-5"/>
              <div>
                <div className="font-semibold text-stone-800">문제 순서 섞기</div>
                <div className="text-xs text-stone-500">단원 순서 대신 무작위로 배치</div>
              </div>
            </label>
            <div className="flex items-center gap-3 p-3 rounded-xl bg-stone-50">
              <div className="font-semibold text-stone-800 flex-1">레이아웃</div>
              <select value={columns} onChange={(e)=>setColumns(Number(e.target.value))}
                      className="px-3 py-1.5 rounded-lg border border-stone-300 bg-white text-sm">
                <option value={1}>1단 컬럼</option>
                <option value={2}>2단 컬럼 (권장)</option>
                <option value={3}>3단 컬럼 (소형)</option>
              </select>
            </div>
          </div>
        </div>

        {/* 4. 인쇄 버튼 */}
        <div className="sticky bottom-0 bg-stone-50/95 backdrop-blur -mx-5 px-5 py-3 border-t border-stone-200">
          <button onClick={handlePrint}
                  disabled={selected.size === 0 || (!includeTest && !includeAnswer)}
                  className={`w-full py-4 rounded-2xl text-lg font-bold shadow-md transition ${
                    selected.size === 0 || (!includeTest && !includeAnswer)
                      ? 'bg-stone-200 text-stone-400 cursor-not-allowed'
                      : 'bg-orange-500 hover:bg-orange-600 text-white'
                  }`}>
            🖨 시험지 미리보기 / 인쇄
            {selected.size > 0 && ` (${selected.size}단원 · ${totalWords}문제)`}
          </button>
          <p className="text-xs text-stone-500 text-center mt-2">
            새 창이 열리면 상단의 [🖨 인쇄하기]를 누르세요.
          </p>
        </div>

      </div>
    </div>
  );
};

/* =========================================================
   15) 메인 App
   ========================================================= */
const App = () => {
  const [view, setView] = useState('home');
  const [stageKey, setStageKey] = useState('a');
  const [lastScore, setLastScore] = useState(0);
  const [selectedReading, setSelectedReading] = useState(null);
  const [selectedTheme, setSelectedTheme] = useState(null);
  const [progress, setProgress] = usePersist('phonics-progress-v2', { words: {}, readings: {}, egu: {} });
  const [reports, setReports] = usePersist('phonics-image-reports-v1', {});
  const [voiceWarning, setVoiceWarning] = useState(null);
  useEffect(() => {
    if (!('speechSynthesis' in window)) {
      setVoiceWarning('이 브라우저는 음성 합성을 지원하지 않습니다. Chrome/Edge 사용을 권장합니다.');
      return;
    }
    const load = () => {
      const voices = window.speechSynthesis.getVoices();
      if (voices.length > 0) {
        _voicesReady = true;
        const hasEn = voices.some(v => /^en/i.test(v.lang));
        if (!hasEn) {
          setVoiceWarning('이 PC에 영어 음성이 설치되어 있지 않을 수 있어요. Windows 설정 → 시간 및 언어 → 음성 → "음성 추가"에서 영어를 추가해 주세요.');
        }
      }
    };
    load();
    window.speechSynthesis.onvoiceschanged = load;
    // 처음 한 번 깨우기 (Chrome 자동재생 정책 풀기에 도움)
    try { window.speechSynthesis.resume(); } catch {}
  }, []);
  const goHome = () => setView('home');
  return (
    <div className="min-h-screen">
      {voiceWarning && (
        <div className="bg-amber-50 border-b border-amber-200 text-amber-800 text-sm px-4 py-2 text-center">
          ⚠️ {voiceWarning}
        </div>
      )}
      {view === 'home' && <HomeView onStart={() => setView('map')} progress={progress}
                                    onReports={() => setView('reports')} onStats={() => setView('stats')}
                                    onReading={() => setView('reading')} onEgu={() => setView('egu')}/>}
      {view === 'map' && <StageMapView onHome={goHome} onPickStage={(k) => { setStageKey(k); setView('lesson'); }} progress={progress}/>}
      {view === 'lesson' && <LessonView stageKey={stageKey} onHome={goHome} setProgress={setProgress} reports={reports} setReports={setReports} onDone={() => setView('quiz')}/>}
      {view === 'quiz' && <QuizView stageKey={stageKey} onHome={goHome} onDone={(score) => { setLastScore(score); setView('result'); }}/>}
      {view === 'result' && <ResultView stageKey={stageKey} score={lastScore} onHome={goHome} onAgain={() => setView('lesson')} onNext={(k) => { setStageKey(k); setView('lesson'); }}/>}
      {view === 'reports' && <ReportsView reports={reports} setReports={setReports} onHome={goHome}/>}
      {view === 'stats' && <StatsView progress={progress} onHome={goHome}/>}
      {view === 'reading' && <ReadingListView onHome={goHome} progress={progress}
                                              onPick={(id) => { setSelectedReading(id); setView('reading-detail'); }}/>}
      {view === 'reading-detail' && <ReadingDetailView readingId={selectedReading} onHome={goHome}
                                                       onBack={() => setView('reading')}
                                                       progress={progress} setProgress={setProgress}/>}
      {view === 'egu' && <EguListView onHome={goHome} progress={progress}
                                      onPick={(id) => { setSelectedTheme(id); setView('egu-theme'); }}
                                      onPrint={() => setView('print-test')}/>}
      {view === 'egu-theme' && <EguThemeView themeId={selectedTheme} onHome={goHome}
                                             onBack={() => setView('egu')}
                                             progress={progress} setProgress={setProgress}/>}
      {view === 'print-test' && <PrintTestView onHome={goHome}/>}
      <footer className="text-center text-xs text-stone-400 py-6">
        진짜 쉬운 파닉스 · 골든샘플 v9 · {TOTAL}단어 · 독해 12 · EGU {EGU_TOTAL}
      </footer>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
